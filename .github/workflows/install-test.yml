name: install-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  install-matrix:
    name: install on ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:22.04
            label: Ubuntu 22.04 (jammy)
          - image: ubuntu:24.04
            label: Ubuntu 24.04 (noble)
          - image: ubuntu:devel
            label: Ubuntu devel (rolling)
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OS deps (python3-venv)
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            python3 python3-venv python3-pip git ca-certificates sudo

      - name: Run install.sh (auto mode)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # The user-mode fallback kicks in when sudo NOPASSWD isn't configured.
          bash install.sh auto
          echo "---- verifying ----"
          ~/.local/bin/ai-reader --version
          ls -l ~/.local/bin/ai-reader-mcp

      - name: Run install.sh (opt mode — sudo NOPASSWD)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "ALL ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/ci
          chmod 0440 /etc/sudoers.d/ci
          bash install.sh opt
          echo "---- verifying ----"
          /opt/ai-reader/.venv/bin/ai-reader --version
          ls -l /opt/ai-reader/.venv/bin/ai-reader-mcp

      - name: Re-run install.sh (idempotency check)
        run: |
          bash install.sh auto

      - name: Uninstall
        run: |
          bash uninstall.sh
